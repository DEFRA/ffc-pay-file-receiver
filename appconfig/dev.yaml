---
environment: production
environmentCode: dev
container:
  azureStorageAccountName: devffcpayst1001
  messageQueueHost: DEVFFCINFSB1001.servicebus.windows.net
  redisHostname: DEVFFCINFRD1001.redis.cache.windows.net
ingress:
  server: azure.defra.cloud
  endpoint: ffc-pay-file-receiver-dev
secretProviderClass:
  azure:
    keyvaultName: DEVFFCINFKV1001
    objects:
      - objectName: devtest-ffcahwr-appInsights-connectionString
        objectType: secret
      - objectName: dev-ffcpayDaxServiceBusConnectionString
        objectType: secret
      - objectName: dev-ffcpayDaxStorageConnectionString
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-file-receiver
      type: Opaque
      data:
        - objectName: devtest-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
        - objectName: dev-ffcpayDaxServiceBusConnectionString
          key: MESSAGE_QUEUE_CONNECTION_STRING
        - objectName: dev-ffcpayDaxStorageConnectionString
          key: AZURE_STORAGE_SHARE_CONNECTION_STRING