---
environment: production
environmentCode: pre
container:
  messageQueueHost: predaxinfsb1241.servicebus.windows.net
  azureStorageAccountName: preffcpayst1001
  redisHostname: PREFFCINFRD1001.redis.cache.windows.net
ingress:
  server: azure.defra.cloud
  endpoint: ffc-pay-file-receiver-pre
secretProviderClass:
  azure:
    keyvaultName: PREFFCINFKV1001
    objects:
      - objectName: pre-ffcahwr-appinsights-connectionString
        objectType: secret
      - objectName: pre-ffcpayDaxServiceBusConnectionString
        objectType: secret
      - objectName: pre-ffcpayDaxStorageConnectionString
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-file-receiver
      type: Opaque
      data:
        - objectName: pre-ffcahwr-appinsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
        - objectName: pre-ffcpayDaxServiceBusConnectionString
          key: MESSAGE_QUEUE_CONNECTION_STRING
        - objectName: pre-ffcpayDaxStorageConnectionString
          key: AZURE_STORAGE_SHARE_CONNECTION_STRING
