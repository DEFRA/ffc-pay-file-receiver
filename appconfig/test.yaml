---
environment: production
environmentCode: test
container:
  azureStorageAccountName: devffcdocst1001
  messageQueueHost: DEVFFCINFSB1001.servicebus.windows.net
  redisHostname: DEVFFCINFRD1001.redis.cache.windows.net
ingress:
  server: azure.defra.cloud
  endpoint: ffc-doc-statement-receiver-test
secretProviderClass:
  azure:
    keyvaultName: DEVFFCINFKV1001
    objects:
      - objectName: devtest-ffcahwr-appInsights-connectionString
        objectType: secret
      - objectName: dev-daxStorageConnectionString
        objectType: secret
      - objectName: dev-messageConnectionString
        objectType: secret

  secretObjects:
    - secretName: ffc-doc-statement-receiver
      type: Opaque
      data:
        - objectName: devtest-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
        - objectName: dev-daxStorageConnectionString
          key: AZURE_STORAGE_SHARE_CONNECTION_STRING
        - objectName: dev-messageConnectionString
          key: MESSAGE_QUEUE_CONNECTION_STRING