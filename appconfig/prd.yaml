---
environment: production
environmentCode: prd
container:
  messageQueueHost: PRDFFCINFSB1001.servicebus.windows.net
  d365MessageQueueHost: prddaxinfsb1241.servicebus.windows.net
  azureStorageAccountName: prdffcpayst1001
  redisHostname: PRDFFCINFRD1001.redis.cache.windows.net
ingress:
  server: azure.defra.cloud
  endpoint: ffc-pay-file-receiver-prd
secretProviderClass:
  azure:
    keyvaultName: PRDFFCINFKV1001
    objects:
      - objectName: prd-ffcahwr-appinsights-connectionString
        objectType: secret
      - objectName: prd-ffcpayDaxServiceBusConnectionString
        objectType: secret
      - objectName: prd-ffcpayDaxStorageConnectionString
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-file-receiver
      type: Opaque
      data:
        - objectName: prd-ffcahwr-appinsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
        - objectName: prd-ffcpayDaxServiceBusConnectionString
          key: D365_MESSAGE_QUEUE_CONNECTION_STRING
        - objectName: prd-ffcpayDaxStorageConnectionString
          key: AZURE_STORAGE_SHARE_CONNECTION_STRING
