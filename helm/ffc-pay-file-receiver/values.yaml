environment: production
environmentCode:
name: ffc-pay-file-receiver
namespace: ffc-pay
workstream: ffc-pay
image: ffc-pay-file-receiver

labels:
  component: service

appInsights:
  connectionString:

containerConfigMap:
  name: ffc-pay-file-receiver-config-map

containerSecret:
  name: ffc-pay-file-receiver
  type: Opaque

deployment:
  minReplicas: 1
  maxReplicas: 1
  cpuThreshold: 80
  memoryThreshold: 80
  minReadySeconds: 0

container:
  requestMemory: 150Mi
  requestCpu: 120m
  limitMemory: 150Mi
  limitCpu: 120m
  messageQueueHost: namespace.servicebus.windows.net
  d365MessageQueueHost: namespace.servicebus.windows.net
  d365MessageConnectionString: dummy
  messageUseCredentialChain: false
  fileConsumeTopicAddress: ffc-pay-file-consume
  fileConsumeSubscriptionAddress: ffc-pay-file-consumer
  azureStorageConnectionString: dummy
  azureStorageAccountName: dummy
  daxStorageConnectionString:
  daxStorageUseConnectionString: true
  daxStorageAccountName: dummy
  azureStorageUseConnectionString: false
  azureStorageCreateContainers: false
  storageContainer: dax
  storageFolder: inbound
  totalRetries: 10
  retryInterval: 1000
  fileReceiverEnabled: true

workloadIdentity: true

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret
      - objectName: snd2-ffcpayDaxStorageConnectionString
        objectType: secret      

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-pay-file-receiver
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPINSIGHTS_CONNECTIONSTRING # the secret key in the Kubernetes secret and use in the application
        - objectName: snd2-ffcpayDaxStorageConnectionString
          key: AZURE_STORAGE_SHARE_CONNECTION_STRING